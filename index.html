<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inscrição em Curso</title>
</head>
<body>

    <h1>Formulário de Inscrição</h1>

    <form action="#" method="post">

        <!-- Nome -->
        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <!-- Email -->
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Telefone -->
        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone" required><br><br>

        <!-- Curso -->
        <label for="curso">Curso de interesse:</label><br>
        <select id="curso" name="curso" required>
            <option value="">Selecione</option>
            <option value="html">HTML e CSS</option>
            <option value="js">JavaScript</option>
            <option value="java">Java</option>
            <option value="python">Python</option>
        </select><br><br>

        <!-- Turno (radio) -->
        <label>Turno:</label><br>
        <input type="radio" id="manha" name="turno" value="manha" required>
        <label for="manha">Manhã</label><br>

        <input type="radio" id="tarde" name="turno" value="tarde">
        <label for="tarde">Tarde</label><br>

        <input type="radio" id="noite" name="turno" value="noite">
        <label for="noite">Noite</label><br><br>

        <!-- Comentário -->
        <label for="comentario">Comentário:</label><br>
        <textarea id="comentario" name="comentario" rows="4" cols="40"></textarea><br><br>

        <!-- Checkbox -->
        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Aceito os termos</label><br><br>

        <!-- Botão -->
        <button type="submit">Enviar inscrição</button>

    </form>

</body>
</html>
